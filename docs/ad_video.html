<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapae - 광고 영상 제작</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#eee;color:#222;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;
}
h1{font-size:20px;margin-bottom:4px;font-weight:700}
.sub{font-size:12px;color:#999;margin-bottom:16px}

/* Upload */
.ug{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%;max-width:750px;margin-bottom:16px}
.us{
  aspect-ratio:9/19.5;border:2px dashed #ccc;border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;position:relative;overflow:hidden;transition:.3s;background:#fafafa;
}
.us:hover{border-color:#888}
.us.ok{border-color:#333;border-style:solid}
.us img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:10px}
.us .lb{font-size:9px;color:#bbb;text-align:center;z-index:1}
.us .lb b{display:block;font-size:20px;color:#ddd;margin-bottom:2px}
.us input{display:none}

/* Controls */
.ctr{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;justify-content:center}
.ctr button{
  padding:10px 22px;border:none;border-radius:8px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:.2s;
}
.ctr button:hover{transform:scale(1.04)}
.ctr button:disabled{opacity:.3;cursor:not-allowed;transform:none}
.bp{background:#222;color:#fff}.br{background:#555;color:#fff}
.bd{background:#888;color:#fff;display:none}.bd.show{display:inline-block}
#st{font-size:11px;color:#999;margin-bottom:12px;text-align:center;min-height:14px}

/* ══════ Stage ══════ */
#stage{
  width:360px;height:640px;position:relative;overflow:hidden;
  background:#fff;border-radius:20px;
  box-shadow:0 2px 30px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);
}

/* Animated bg */
.bgshift{
  position:absolute;inset:0;z-index:0;
  background:linear-gradient(135deg,#ffffff 0%,#f4f4f6 30%,#eaeaee 60%,#f0f0f2 100%);
  background-size:300% 300%;
  animation:bgMove 6s ease infinite;
}
@keyframes bgMove{
  0%{background-position:0% 0%}
  33%{background-position:100% 50%}
  66%{background-position:50% 100%}
  100%{background-position:0% 0%}
}

/* Floating blobs */
.blob{
  position:absolute;border-radius:50%;pointer-events:none;z-index:1;
  filter:blur(60px);opacity:.06;
}
.blob-1{width:200px;height:200px;background:#999;top:-40px;left:-60px;animation:blobFloat1 10s ease-in-out infinite}
.blob-2{width:180px;height:180px;background:#aaa;bottom:-30px;right:-50px;animation:blobFloat2 12s ease-in-out infinite}
.blob-3{width:140px;height:140px;background:#888;top:50%;left:50%;animation:blobFloat3 8s ease-in-out infinite}
@keyframes blobFloat1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,40px)}}
@keyframes blobFloat2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,-30px)}}
@keyframes blobFloat3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-30%,-60%) scale(1.2)}}

/* Particles */
.pts{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.pt{
  position:absolute;border-radius:50%;background:rgba(0,0,0,.04);
  animation:fp var(--d) var(--dl) linear infinite;
}
@keyframes fp{
  0%{transform:translateY(700px) scale(0);opacity:0}
  10%{opacity:1}90%{opacity:1}
  100%{transform:translateY(-60px) scale(1);opacity:0}
}

/* ══════ Scenes ══════ */
.sc{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;z-index:2;pointer-events:none;
}

/* ─── S1: Hook ─── */
.s1{z-index:10}
.s1 .pile{position:relative;width:260px;height:155px;margin-bottom:28px}
.s1 .pc{
  position:absolute;width:220px;height:130px;
  background:linear-gradient(145deg,#eaeaea,#f8f8f8);
  border-radius:10px;border:1px solid #d8d8d8;
  display:flex;align-items:center;justify-content:center;
  color:#aaa;font-size:11px;font-weight:500;
  box-shadow:0 6px 24px rgba(0,0,0,.08);opacity:0;
}
.s1.on .pc{animation:cardDrop .4s cubic-bezier(.22,1.4,.36,1) both}
.s1.on .pc:nth-child(1){animation-delay:.05s}
.s1.on .pc:nth-child(2){animation-delay:.18s}
.s1.on .pc:nth-child(3){animation-delay:.3s}
.s1 .pc:nth-child(1){top:0;left:0;transform:rotate(-10deg)}
.s1 .pc:nth-child(2){top:8px;left:16px;transform:rotate(-3deg)}
.s1 .pc:nth-child(3){top:18px;left:32px;transform:rotate(6deg)}
.s1 .htxt{font-size:28px;font-weight:900;text-align:center;line-height:1.4;color:#111;opacity:0}
.s1.on .htxt{animation:textPop .45s .45s cubic-bezier(.22,1.4,.36,1) both}
.s1 .htxt em{
  font-style:normal;color:#333;
  background:linear-gradient(to top,rgba(0,0,0,.06) 40%,transparent 40%);
  padding:0 4px;
}

/* ─── S2: Logo ─── */
.s2{z-index:10}
.s2 .lw{text-align:center;opacity:0;transform:scale(.4)}
.s2.on .lw{animation:logoBoom .5s cubic-bezier(.22,1.4,.36,1) both}
.s2 .ai{
  width:72px;height:72px;border-radius:18px;margin:0 auto 14px;
  overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08);
}
.s2.on .ai{animation:iconFloat 2s .5s ease-in-out infinite}
.s2 .ai img{width:100%;height:100%;object-fit:cover}
.s2 .ml{font-size:52px;font-weight:900;letter-spacing:4px;color:#111}
.s2 .tg{font-size:16px;color:#999;margin-top:6px;font-weight:300;opacity:0}
.s2.on .tg{animation:fadeUp .35s .3s ease both}
/* Ripple rings behind logo */
.s2 .ripple{
  position:absolute;width:120px;height:120px;border-radius:50%;
  border:1.5px solid rgba(0,0,0,.04);opacity:0;pointer-events:none;
}
.s2.on .ripple:nth-child(1){animation:rippleOut 1.5s .1s ease infinite}
.s2.on .ripple:nth-child(2){animation:rippleOut 1.5s .5s ease infinite}
.s2.on .ripple:nth-child(3){animation:rippleOut 1.5s .9s ease infinite}

/* ══════ Phone cards (stacking) ══════ */
.phone-layer{
  position:absolute;inset:0;z-index:20;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
}
.phone-card{
  position:absolute;
  width:280px;height:560px;
  border-radius:32px;
  border:2px solid rgba(0,0,0,.08);
  overflow:hidden;background:#fff;
  box-shadow:0 16px 60px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.04);
  opacity:0;
  will-change:transform,opacity;
}
.phone-card img{
  width:100%;height:100%;object-fit:cover;object-position:center top;
  image-rendering:-webkit-optimize-contrast;
}
/* Dynamic island */
.phone-card::before{
  content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:80px;height:22px;background:#111;border-radius:12px;
  z-index:5;opacity:.85;
}
/* Shine sweep */
.phone-card::after{
  content:'';position:absolute;top:0;left:-90%;
  width:60%;height:100%;z-index:4;
  background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.2) 50%,transparent 70%);
  opacity:0;pointer-events:none;
}

/* Slide directions: LEFT and RIGHT only */
.phone-card.from-left{transform:translateX(-440px) rotate(-4deg)}
.phone-card.from-right{transform:translateX(440px) rotate(4deg)}

.phone-card.in{
  opacity:1;transform:translate(0,0) rotate(0deg);
  transition:transform .5s cubic-bezier(.22,1,.36,1),opacity .25s ease;
}
.phone-card.in::after{animation:shineSweep .7s .35s ease both}

/* Pushed back effect when a new card comes */
.phone-card.pushed-left{
  transform:translateX(-18px) scale(.96) rotate(-1.5deg);
  transition:transform .5s cubic-bezier(.22,1,.36,1);
  filter:brightness(.97);
}
.phone-card.pushed-right{
  transform:translateX(18px) scale(.96) rotate(1.5deg);
  transition:transform .5s cubic-bezier(.22,1,.36,1);
  filter:brightness(.97);
}
.phone-card.pushed-deep{
  transform:scale(.92) rotate(0deg);
  transition:transform .5s cubic-bezier(.22,1,.36,1);
  filter:brightness(.94);
}

/* ══════ Badges ══════ */
.fbadge{
  position:absolute;
  background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(250,250,250,.95));
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  padding:12px 22px;border-radius:16px;text-align:center;
  border:1px solid rgba(0,0,0,.04);
  box-shadow:0 8px 32px rgba(0,0,0,.1),0 1px 3px rgba(0,0,0,.04);
  z-index:50;opacity:0;pointer-events:none;
  white-space:nowrap;
}
.fbadge h2{font-size:17px;font-weight:800;color:#111;margin-bottom:2px}
.fbadge p{font-size:11px;color:#999;font-weight:300}

/* Badge positions */
.fbadge.pos-bl{bottom:44px;left:16px;transform:translateX(-50px) scale(.9)}
.fbadge.pos-tr{top:50px;right:16px;transform:translateX(50px) scale(.9)}
.fbadge.pos-br{bottom:50px;right:16px;transform:translateX(50px) scale(.9)}
.fbadge.pos-tl{top:56px;left:16px;transform:translateX(-50px) scale(.9)}
.fbadge.pos-bc{bottom:44px;left:50%;transform:translateX(-50%) translateY(30px) scale(.9)}

.fbadge.in{
  opacity:1;transform:translate(0,0) scale(1);
  transition:opacity .25s ease,transform .4s cubic-bezier(.22,1.4,.36,1),box-shadow .3s ease;
  box-shadow:0 12px 40px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.06);
}
.fbadge.pos-bc.in{transform:translateX(-50%) translateY(0) scale(1)}

.fbadge.out{
  opacity:0;transform:translateY(-20px) scale(.95);
  transition:opacity .2s ease,transform .25s ease;
}
.fbadge.pos-bc.out{transform:translateX(-50%) translateY(-20px) scale(.95)}

/* ══════ CTA ══════ */
.cta-layer{
  position:absolute;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  opacity:0;pointer-events:none;
  transition:opacity .6s ease;
}
.cta-layer.on{opacity:1}
.cta-layer .cl{
  font-size:60px;font-weight:900;letter-spacing:5px;color:#111;
  margin-bottom:10px;opacity:0;
  background:linear-gradient(90deg,#111,#444,#111);
  background-size:200% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.cta-layer.on .cl{animation:logoBoom .5s cubic-bezier(.22,1.4,.36,1) both,shimmerText 3s 1s ease infinite}
.cta-layer .ct2{font-size:18px;color:#999;font-weight:300;margin-bottom:32px;opacity:0}
.cta-layer.on .ct2{animation:fadeUp .4s .3s ease both}
.cta-layer .cb{
  padding:14px 42px;background:#111;color:#fff;border-radius:32px;
  font-size:16px;font-weight:700;opacity:0;
  box-shadow:0 4px 16px rgba(0,0,0,.1);
}
.cta-layer.on .cb{animation:fadeUp .4s .5s ease both,ctaPulse 2s 1.5s ease infinite}

/* ══════ Keyframes ══════ */
@keyframes cardDrop{
  0%{opacity:0;transform:translateY(-50px) rotate(var(--r,0deg)) scale(.6)}
  70%{transform:translateY(5px) rotate(var(--r,0deg)) scale(1.02)}
  100%{opacity:1;transform:translateY(0) rotate(var(--r,0deg)) scale(1)}
}
@keyframes textPop{
  0%{opacity:0;transform:translateY(30px) scale(.8)}
  70%{transform:translateY(-3px) scale(1.02)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes logoBoom{
  0%{opacity:0;transform:scale(.2)}
  70%{transform:scale(1.06)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes shineSweep{from{left:-90%;opacity:1}to{left:140%;opacity:0}}
@keyframes rippleOut{
  0%{transform:scale(1);opacity:.3}
  100%{transform:scale(4);opacity:0}
}
@keyframes iconFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}
@keyframes shimmerText{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
@keyframes ctaPulse{
  0%,100%{box-shadow:0 4px 16px rgba(0,0,0,.1)}
  50%{box-shadow:0 6px 28px rgba(0,0,0,.18)}
}
@keyframes recBlink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<h1>Mapae 광고 영상 제작</h1>
<p class="sub">5장의 앱 스크린샷 업로드 &rarr; 실제 화면 광고 생성</p>

<div class="ug">
  <div class="us" onclick="this.querySelector('input').click()" id="slot0">
    <span class="lb"><b>1</b>홈(명함뷰)</span><input type="file" accept="image/*" onchange="loadImg(0,this)">
  </div>
  <div class="us" onclick="this.querySelector('input').click()" id="slot1">
    <span class="lb"><b>2</b>지갑(목록)</span><input type="file" accept="image/*" onchange="loadImg(1,this)">
  </div>
  <div class="us" onclick="this.querySelector('input').click()" id="slot2">
    <span class="lb"><b>3</b>퀵쉐어</span><input type="file" accept="image/*" onchange="loadImg(2,this)">
  </div>
  <div class="us" onclick="this.querySelector('input').click()" id="slot3">
    <span class="lb"><b>4</b>CRM</span><input type="file" accept="image/*" onchange="loadImg(3,this)">
  </div>
  <div class="us" onclick="this.querySelector('input').click()" id="slot4">
    <span class="lb"><b>5</b>관리</span><input type="file" accept="image/*" onchange="loadImg(4,this)">
  </div>
</div>

<div class="ctr">
  <button class="bp" id="playBtn" onclick="playAd()" disabled>&#9654; 재생</button>
  <button class="br" id="recBtn" onclick="recordAd()" disabled>&#9679; 녹화 &amp; 다운로드</button>
  <button class="bd" id="dlBtn" onclick="dlFile()">&#11015; 다시 다운로드</button>
</div>
<div id="st">스크린샷 5장을 업로드하세요</div>

<div id="stage">
  <div class="bgshift"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="pts" id="pw"></div>

  <!-- S1: Hook -->
  <div class="sc s1" id="sc1">
    <div class="pile">
      <div class="pc" style="--r:-10deg">김철수 부장</div>
      <div class="pc" style="--r:-3deg">박영희 과장</div>
      <div class="pc" style="--r:6deg">이민수 대리</div>
    </div>
    <div class="htxt">명함, 아직도<br><em>이렇게</em> 관리하세요?</div>
  </div>

  <!-- S2: Logo -->
  <div class="sc s2" id="sc2">
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="lw">
      <div class="ai" id="iconWrap"></div>
      <div class="ml">Mapae</div>
      <div class="tg">스마트 명함 지갑</div>
    </div>
  </div>

  <!-- Phone stacking layer: alternating LEFT / RIGHT -->
  <div class="phone-layer" id="phoneLayer">
    <div class="phone-card from-left" id="ph0"><img id="si0" src="" alt=""></div>
    <div class="phone-card from-right" id="ph1"><img id="si1" src="" alt=""></div>
    <div class="phone-card from-left" id="ph2"><img id="si2" src="" alt=""></div>
    <div class="phone-card from-right" id="ph3"><img id="si3" src="" alt=""></div>
    <div class="phone-card from-left" id="ph4"><img id="si4" src="" alt=""></div>
  </div>

  <!-- Badges at varied positions -->
  <div class="fbadge pos-bl" id="bd0"><h2>내 명함을 공유하세요</h2><p>3D 뷰어 &middot; 원터치 공유</p></div>
  <div class="fbadge pos-tr" id="bd1"><h2>모든 명함, 한 곳에</h2><p>검색 &middot; 필터 &middot; 카테고리</p></div>
  <div class="fbadge pos-br" id="bd2"><h2>퀵쉐어</h2><p>만나면 바로 명함 교환</p></div>
  <div class="fbadge pos-tl" id="bd3"><h2>팀 CRM 관리</h2><p>파이프라인을 한눈에</p></div>
  <div class="fbadge pos-bc" id="bd4"><h2>팀 관리</h2><p>팀원과 명함을 공유</p></div>

  <!-- CTA -->
  <div class="cta-layer" id="ctaLayer">
    <div class="cl">Mapae</div>
    <div class="ct2">명함의 새로운 기준</div>
    <div class="cb">지금 시작하세요</div>
  </div>
</div>

<script>
/* ── Config ── */
const PHONES = [
  { ph:'ph0', bd:'bd0', dir:'from-left' },
  { ph:'ph1', bd:'bd1', dir:'from-right' },
  { ph:'ph2', bd:'bd2', dir:'from-left' },
  { ph:'ph3', bd:'bd3', dir:'from-right' },
  { ph:'ph4', bd:'bd4', dir:'from-left' },
];
const BADGE_DELAY = 400;
const BADGE_SHOW = 1600;
const PHONE_GAP = 200;

/* ── Particles ── */
(function(){
  const w=document.getElementById('pw');
  for(let i=0;i<30;i++){
    const p=document.createElement('div');
    p.className='pt';
    p.style.left=Math.random()*100+'%';
    p.style.setProperty('--d',(4+Math.random()*8)+'s');
    p.style.setProperty('--dl',(Math.random()*5)+'s');
    const s=1.5+Math.random()*5;
    p.style.width=s+'px';p.style.height=s+'px';
    p.style.opacity=.02+Math.random()*.04;
    w.appendChild(p);
  }
})();

/* ── State ── */
const imgs=[null,null,null,null,null];
let playing=false,blobUrl=null;

/* App icon */
const ico=new Image();
ico.src='../assets/Mapae_icon_big.png';
ico.onload=()=>{document.getElementById('iconWrap').innerHTML='';document.getElementById('iconWrap').appendChild(ico)};
ico.onerror=()=>{
  const w=document.getElementById('iconWrap');
  w.style.cssText='background:#111;display:flex;align-items:center;justify-content:center';
  w.innerHTML='<span style="font-size:36px;font-weight:900;color:#fff">M</span>';
};

/* ── Upload ── */
function loadImg(i,inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    imgs[i]=e.target.result;
    const sl=document.getElementById('slot'+i);
    sl.classList.add('ok');
    let im=sl.querySelector('img');
    if(!im){im=document.createElement('img');sl.appendChild(im)}
    im.src=e.target.result;
    document.getElementById('si'+i).src=e.target.result;
    chkReady();
  };
  r.readAsDataURL(f);
}
function chkReady(){
  const n=imgs.filter(Boolean).length;
  document.getElementById('st').textContent=n<5?n+'/5 업로드':'준비 완료! 재생 또는 녹화';
  document.getElementById('playBtn').disabled=n<5;
  document.getElementById('recBtn').disabled=n<5;
}

/* ── Playback ── */
const wait=ms=>new Promise(r=>setTimeout(r,ms));

function resetAll(){
  document.getElementById('sc1').classList.remove('on');
  document.getElementById('sc1').style.opacity='0';
  document.getElementById('sc2').classList.remove('on');
  document.getElementById('sc2').style.opacity='0';
  PHONES.forEach(e=>{
    const ph=document.getElementById(e.ph);
    ph.classList.remove('in','pushed-left','pushed-right','pushed-deep');
    ph.style.transition='none';
    ph.style.filter='';
    ph.className='phone-card '+e.dir;
    void ph.offsetWidth;
    const bd=document.getElementById(e.bd);
    bd.classList.remove('in','out');
    bd.style.transition='none';
    void bd.offsetWidth;
  });
  document.getElementById('ctaLayer').classList.remove('on');
}

async function runSeq(){
  if(playing)return;
  playing=true;
  resetAll();
  await wait(80);

  /* ── S1: Hook (2.0s) ── */
  const sc1=document.getElementById('sc1');
  sc1.style.transition='opacity .3s ease';
  sc1.style.opacity='1';
  sc1.classList.add('on');
  await wait(2000);
  sc1.style.opacity='0';
  await wait(280);

  /* ── S2: Logo (1.6s) ── */
  const sc2=document.getElementById('sc2');
  sc2.style.transition='opacity .3s ease';
  sc2.style.opacity='1';
  sc2.classList.add('on');
  await wait(1600);
  sc2.style.opacity='0';
  await wait(280);

  /* ── Phone stacking ── */
  for(let i=0;i<PHONES.length;i++){
    const {ph,bd,dir}=PHONES[i];
    const phEl=document.getElementById(ph);
    const bdEl=document.getElementById(bd);

    phEl.style.zIndex=30+i;
    bdEl.style.zIndex=50+i;

    // Push previous cards back
    for(let j=0;j<i;j++){
      const prevPh=document.getElementById(PHONES[j].ph);
      prevPh.classList.remove('pushed-left','pushed-right','pushed-deep');
      void prevPh.offsetWidth;
      if(j===i-1){
        // Most recent prev: push in opposite direction of incoming
        prevPh.classList.add(dir==='from-left'?'pushed-right':'pushed-left');
      } else {
        // Older cards: push deeper
        prevPh.classList.add('pushed-deep');
      }
    }

    // Slide phone in
    phEl.style.transition='transform .5s cubic-bezier(.22,1,.36,1), opacity .25s ease';
    void phEl.offsetWidth;
    phEl.classList.add('in');

    // Badge in
    await wait(BADGE_DELAY);
    bdEl.style.transition='opacity .25s ease, transform .4s cubic-bezier(.22,1.4,.36,1), box-shadow .3s ease';
    void bdEl.offsetWidth;
    bdEl.classList.add('in');

    await wait(BADGE_SHOW);

    // Badge out (float up)
    bdEl.classList.remove('in');
    bdEl.classList.add('out');

    await wait(PHONE_GAP);
  }

  await wait(300);

  /* ── CTA ── */
  document.getElementById('ctaLayer').classList.add('on');
  await wait(2500);

  playing=false;
}

function playAd(){runSeq()}

/* ── Record ── */
async function recordAd(){
  const s=document.getElementById('st'),dl=document.getElementById('dlBtn');
  try{
    s.textContent='팝업에서 이 탭을 선택하세요...';
    const stream=await navigator.mediaDevices.getDisplayMedia({
      video:{displaySurface:'browser',frameRate:30},audio:false,preferCurrentTab:true
    });
    const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
    const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:8000000});
    const chunks=[];
    rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};
    rec.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop());
      if(!chunks.length){s.textContent='녹화 실패';return}
      const blob=new Blob(chunks,{type:'video/webm'});
      if(blobUrl)URL.revokeObjectURL(blobUrl);
      blobUrl=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=blobUrl;a.download='Mapae_Ad.webm';a.click();
      s.textContent='녹화 완료!';dl.classList.add('show');
    };
    rec.start(100);
    s.innerHTML='<span style="color:#f44336;animation:recBlink 1s infinite">&#9679;</span> 녹화 중...';
    await wait(400);await runSeq();await wait(1200);rec.stop();
  }catch(e){s.textContent='취소: '+e.message}
}
function dlFile(){
  if(!blobUrl)return;
  const a=document.createElement('a');a.href=blobUrl;a.download='Mapae_Ad.webm';a.click();
}
